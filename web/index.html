<!DOCTYPE html>
<html>
    <head>
        <title>Welcome to HopeLink</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
        
        <style>
            body {
                font-family: 'Quicksand', sans-serif;
                background-color: #fff9fa;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h1 {
                color: #d63384;
                margin-bottom: 20px;
            }

            .home-link {
                text-decoration: none;
                background: linear-gradient(135deg, #ffb3c1 0%, #ff85a1 100%);
                color: white;
                padding: 15px 30px;
                border-radius: 50px;
                font-weight: 700;
                font-size: 1.1em;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(255, 133, 161, 0.3);
            }

            .home-link:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(255, 133, 161, 0.5);
                color: white;
            }
        </style>
    </head>
    <body>

        <h1>Welcome to HopeLink ✨</h1>
        
        <a href="HomePage.jsp" class="home-link">Enter Platform →</a>

    </body>
</html>
